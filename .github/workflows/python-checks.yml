name: Python Checks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install ruff mypy

      - name: Run Ruff (linting & formatting)
        run: |
          ruff check pyfastgrep/ tests/
          ruff format --check pyfastgrep/ tests/

      - name: Run MyPy (type checking)
        run: mypy pyfastgrep/
