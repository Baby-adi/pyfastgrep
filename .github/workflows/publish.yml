name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64, x86, aarch64, armv7]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Build wheels
      uses: PyO3/maturin-action@v1
      with:
        target: ${{ matrix.target }}
        args: --release --out dist
        sccache: 'true'
        manylinux: auto
    - name: Test wheel (host-native only)
      if: matrix.target == 'x86_64'
      run: |
        pip install pyfastgrep --no-index --find-links dist --force-reinstall
        python tests/mandatory_tests.py
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-linux-${{ matrix.target }}
        path: dist

  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x64, x86]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        architecture: ${{ matrix.target }}
    - name: Build wheels
      uses: PyO3/maturin-action@v1
      with:
        target: ${{ matrix.target }}
        args: --release --out dist
        sccache: 'true'
    - name: Test wheel (host-native only)
      if: matrix.target == 'x64'
      run: |
        pip install pyfastgrep --no-index --find-links dist --force-reinstall
        python tests/mandatory_tests.py
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-windows-${{ matrix.target }}
        path: dist

  macos-x86_64:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Build wheels
      uses: PyO3/maturin-action@v1
      with:
        target: x86_64
        args: --release --out dist
        sccache: 'true'
    - name: Test wheel
      run: |
        pip install pyfastgrep --no-index --find-links dist --force-reinstall
        python tests/mandatory_tests.py
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-macos-x86_64
        path: dist

  macos-aarch64:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    - name: Build wheels
      uses: PyO3/maturin-action@v1
      with:
        target: aarch64
        args: --release --out dist
        sccache: 'true'
    - name: Test wheel
      run: |
        pip install pyfastgrep --no-index --find-links dist --force-reinstall
        python tests/mandatory_tests.py
    - name: Upload wheels
      uses: actions/upload-artifact@v4
      with:
        name: wheels-macos-aarch64
        path: dist

  sdist:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build sdist
      uses: PyO3/maturin-action@v1
      with:
        command: sdist
        args: --out dist
    - name: Upload sdist
      uses: actions/upload-artifact@v4
      with:
        name: sdist
        path: dist

  publish:
    name: Publish to PyPI
    needs: [linux, windows, macos-x86_64, macos-aarch64, sdist]
    runs-on: ubuntu-latest
    # Only publish on version tags, not manual workflow_dispatch
    if: startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/pyfastgrep
    permissions:
      id-token: write
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: dist
        pattern: '*'
        merge-multiple: true
    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: dist/
